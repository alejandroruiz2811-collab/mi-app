<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón CUC Escucha - sugrencia estudiantiles</title>

    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .contenedor {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            font-size: 1rem;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input,
        textarea {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <h1>Buzón CUC Escucha</h1>

        <p>
            Comparte tus sugerencias para mejorar la experiencia estudiantil en la Facultad de Ingeniería.
        </p>

        <form action="#" method="post">

            <input type="text" name="nombre" placeholder="Nombre completo" required>

            <input type="email" name="correo" placeholder="Correo institucional" required>

            <input type="text" name="programa" placeholder="Programa académico" required>

            <input type="text" name="semestre" placeholder="Semestre" required>

            <textarea name="mensaje" placeholder="Escribe tu sugerencia aquí..." required></textarea>

            <button type="submit">Enviar sugerencia</button>

        </form>

        <footer>
            <p>Creado por Alejandro Ruiz 🚀</p>
        </footer>

    </div>

</body>

</html>
