<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página Web</title>

    <style>
        /* Estilos generales */

        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        /* Contenedor principal */

        .contenedor {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        /* Botón */

        .boton {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .boton:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        /* Footer */

        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <h1>¡Bienvenidos a mi primera página web!</h1>

        <p>
            Este es el inicio de mi proyecto utilizando
            <strong>HTML</strong>.
        </p>

        <p>
            Configuré este entorno usando <strong>VS Code</strong> y está listo para ser subido a
            <strong>GitHub</strong>.
        </p>

        <a href="#" class="boton">Saber más</a>

        <footer>
            <p>Creado por Alejandro Ruiz 🚀</p>
        </footer>

    </div>

</body>

</html>
